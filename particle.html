<!DOCTYPE html>
<html>
    <head>

    </head>
    <body style="background-color: #121215;">
        <script>
            const canvas = document.createElement("canvas");
            canvas.width = window.innerWidth
            canvas.height = window.innerHeight
            document.body.appendChild(canvas)

            const ctx = canvas.getContext("2d");

            const particles = [];

            const startColor = [95, 4, 173]
            const endColor = [75, 201, 183]

            const lifetime = 3
            const timestep = 1*60/1000

            function mapNum(x, in_min, in_max, out_min, out_max) {
                return (x - in_min) * (out_max - out_min) / (in_max - in_min) + out_min
            }

            function drawStar(cx,cy,spikes,outerRadius,innerRadius){
                var rot=Math.PI/2*3;
                var x=cx;
                var y=cy;
                var step=Math.PI/spikes;

                ctx.beginPath();
                ctx.moveTo(cx,cy-outerRadius)
                for(i=0;i<spikes;i++){
                    x=cx+Math.cos(rot)*outerRadius;
                    y=cy+Math.sin(rot)*outerRadius;
                    ctx.lineTo(x,y)
                    rot+=step

                    x=cx+Math.cos(rot)*innerRadius;
                    y=cy+Math.sin(rot)*innerRadius;
                    ctx.lineTo(x,y)
                    rot+=step
                }
                ctx.lineTo(cx,cy-outerRadius);
                ctx.closePath();
                ctx.lineWidth=5;
                //ctx.strokeStyle='blue';
                //ctx.stroke();
                //ctx.fillStyle='skyblue';
                ctx.fill();
            }

            setInterval(() => {
                for (let i = 0; i < 1; i++) {
                    const randomRot = Math.random() * Math.PI / 2

                    if (Math.random() < 0.5)
                    particles.push({
                        time: 0,
                        x: 200,
                        y: 200/* + Math.random() * 100*/,
                        yVelocity: Math.sin(randomRot)*7,
                        xVelocity: Math.cos(randomRot)*7,
                        rotation: Math.random() * 2 * Math.PI,
                        random: Math.random(),
                    })
                }

                ctx.globalCompositeOperation = "source-over"
                ctx.fillStyle = "#000000"
                ctx.fillRect(0,0,10000,10000)
                for (const particle of particles) {
                    particle.x += particle.xVelocity
                    particle.y += particle.yVelocity
                    //particle.yVelocity -= 1/20
                    particle.time += timestep

                    const timeNorm = mapNum(particle.time, 0, lifetime, 0, 1)
                    const color = [
                        mapNum(timeNorm, 0, 1, startColor[0], endColor[0]),
                        mapNum(timeNorm, 0, 1, startColor[1], endColor[1]),
                        mapNum(timeNorm, 0, 1, startColor[2], endColor[2])
                    ]
                    const size = Math.min(1,mapNum(timeNorm, 0, 1, 2, 0.2)) * particle.random
                    const alpha = mapNum(timeNorm, 0, 1, 1, 0)

                    ctx.globalCompositeOperation = "lighter"
                    ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},${alpha})`
                    
                    ctx.save()
                    ctx.translate(particle.x, particle.y)
                    ctx.rotate(particle.rotation)
                    drawStar(0, 0, 5, 30 * size, 15 * size)
                    ctx.restore()
                }

                for (let i = particles.length - 1; i > 0; i--) {
                    if (particles[i].time >= lifetime) {
                        particles.splice(i,1)
                    }
                }
            }, timestep*1000)
        </script>
    </body>
</html>
